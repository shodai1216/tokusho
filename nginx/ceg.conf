server {
    listen 80;
    server_name ceg.tokusho.org;

    root /home/shodai/www/ceg;
    index index.html;

    # コメントAPI（FastAPI / 127.0.0.1:8100）へプロキシ。
    # 末尾スラッシュにより /api/comments → バックエンドの /comments になる。
    location /api/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /naran → /naran/ → /naran/index.html の順に解決。無ければ404
    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|mp4|css|js|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
