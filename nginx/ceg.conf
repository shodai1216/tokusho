server {
    listen 80;
    server_name ceg.tokusho.org;

    root /home/shodai/www/ceg;
    index index.html;

    # /naran → /naran/ → /naran/index.html の順に解決。無ければ404
    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|mp4|css|js|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
