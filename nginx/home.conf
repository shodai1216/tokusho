# tokusho.org の apex（トップページ "Shodai'home" ランディング）
# 注意: この home/ サイトは apex（tokusho.org）。home.tokusho.org（SmartLock）とは別物。
server {
    listen 80;
    server_name tokusho.org www.tokusho.org;

    root /home/shodai/www/home;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|mp4|css|js|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
