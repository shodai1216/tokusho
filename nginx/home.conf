# tokusho.org の apex（トップページ "Shodai'home" ランディング）
# 注意: この home/ サイトは apex（tokusho.org）。home.tokusho.org（SmartLock）とは別物。
server {
    listen 80;
    server_name tokusho.org www.tokusho.org;

    root /home/shodai/www/home;
    index index.html;

    # apex（管理ポータル）は本人専用：Basic認証で保護。
    # htpasswd ファイルは: sudo htpasswd -c /etc/nginx/.htpasswd_tokusho shodai
    auth_basic "Tokusho Admin";
    auth_basic_user_file /etc/nginx/.htpasswd_tokusho;

    # サーバー管理API（FastAPI / 127.0.0.1:8200）へプロキシ。
    # auth_basic がここにも効くため、認証を通らないと到達できない。
    # 末尾スラッシュにより /admin/api/status → バックエンドの /status になる。
    location /admin/api/ {
        proxy_pass http://127.0.0.1:8200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 40s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|mp4|css|js|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
