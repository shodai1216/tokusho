<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokusho Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg:       #070d14;
      --c-surface:  #0d1a26;
      --c-surface2: #0f2035;
      --c-border:   rgba(34,211,238,0.10);
      --c-primary:  #22d3ee;
      --c-secondary:#0891b2;
      --c-text:     #e2f0f5;
      --c-muted:    #5d8a9a;
      --c-accent:   #67e8f9;
      --c-ok:       #34d399;
      --c-bad:      #f87171;
      --c-warn:     #fbbf24;
      --r-card:     16px;
      --shadow:     0 4px 32px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', -apple-system, sans-serif; background: var(--c-bg); min-height: 100vh; color: var(--c-text); }

    .hero { background: linear-gradient(125deg, #040b12 0%, #071929 52%, #0a2438 100%); border-bottom: 1px solid var(--c-border); }
    .hero-inner { max-width: 1080px; margin: 0 auto; padding: 0 24px; height: 62px; display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 34px; height: 34px; border-radius: 9px; background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.22); display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .brand-name { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .brand-name em { color: var(--c-primary); font-style: normal; }
    .clock { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--c-muted); }

    .main { max-width: 1080px; margin: 0 auto; padding: 24px 16px 48px; display: flex; flex-direction: column; gap: 18px; }
    @media (min-width: 860px) { .main { padding: 28px 24px 56px; } .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; } }

    .card { background: var(--c-surface); border-radius: var(--r-card); box-shadow: var(--shadow); border: 1px solid var(--c-border); padding: 22px; }
    .section-label { font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 700; color: var(--c-primary); letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 7px; margin-bottom: 16px; }
    .section-label::before { content: ''; width: 3px; height: 13px; background: linear-gradient(180deg, var(--c-accent), var(--c-secondary)); border-radius: 2px; }
    .section-label .reload { margin-left: auto; font: inherit; font-size: 11px; text-transform: none; letter-spacing: 0; color: var(--c-primary); background: rgba(34,211,238,0.06); border: 1px solid var(--c-border); border-radius: 8px; padding: 4px 12px; cursor: pointer; }
    .section-label .reload:hover { background: rgba(34,211,238,0.14); }

    /* 公開サイト */
    .sites { display: flex; flex-direction: column; gap: 10px; }
    .site { display: flex; align-items: center; gap: 12px; background: var(--c-surface2); border: 1px solid var(--c-border); border-radius: 12px; padding: 12px 14px; text-decoration: none; color: inherit; transition: border-color 0.15s, transform 0.12s; }
    .site:hover { border-color: rgba(34,211,238,0.3); transform: translateY(-1px); }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: var(--c-muted); box-shadow: 0 0 0 3px rgba(255,255,255,0.02); }
    .dot.up { background: var(--c-ok); box-shadow: 0 0 8px rgba(52,211,153,0.5); }
    .dot.down { background: var(--c-bad); box-shadow: 0 0 8px rgba(248,113,113,0.4); }
    .site-body { flex: 1; min-width: 0; }
    .site-name { font-weight: 700; font-size: 14px; }
    .site-url { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--c-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .site-arrow { color: var(--c-muted); font-size: 16px; }

    /* システム情報 */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .metric { background: var(--c-surface2); border: 1px solid var(--c-border); border-radius: 12px; padding: 13px 14px; }
    .metric-label { font-size: 10px; color: var(--c-muted); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
    .metric-value { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800; }
    .metric-sub { font-size: 11px; color: var(--c-muted); margin-top: 2px; }
    .bar { height: 6px; background: rgba(34,211,238,0.08); border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .bar > span { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--c-secondary), var(--c-accent)); transition: width 0.5s; }
    .bar > span.hot { background: linear-gradient(90deg, #b45309, var(--c-warn)); }

    /* サービス */
    .svc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .svc-table th { text-align: left; color: var(--c-muted); font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; padding: 0 8px 10px; border-bottom: 1px solid var(--c-border); }
    .svc-table td { padding: 10px 8px; border-bottom: 1px solid rgba(34,211,238,0.04); vertical-align: middle; }
    .svc-table tr:last-child td { border-bottom: none; }
    .badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 700; }
    .badge.active { background: rgba(52,211,153,0.1); color: var(--c-ok); }
    .badge.inactive, .badge.failed, .badge.unknown { background: rgba(248,113,113,0.1); color: var(--c-bad); }
    .svc-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .btn-sm { padding: 5px 11px; border-radius: 7px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: 1px solid var(--c-border); background: rgba(34,211,238,0.05); color: var(--c-primary); }
    .btn-sm:hover { background: rgba(34,211,238,0.14); }
    .btn-sm.warn { color: var(--c-warn); border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.06); }
    .btn-sm.warn:hover { background: rgba(251,191,36,0.16); }
    .btn-sm:disabled { opacity: 0.4; cursor: default; }

    .err { color: var(--c-bad); font-size: 12px; padding: 8px 2px; }
    .muted { color: var(--c-muted); font-size: 12px; }

    /* ログモーダル */
    .modal-overlay { position: fixed; inset: 0; background: rgba(4,11,18,0.82); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 18px; width: min(820px, 100%); max-height: 86vh; display: flex; flex-direction: column; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }
    .modal-head { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--c-border); }
    .modal-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 15px; }
    .modal-title em { color: var(--c-primary); font-style: normal; }
    .modal-close { margin-left: auto; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: var(--c-muted); border-radius: 8px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
    .modal-close:hover { color: var(--c-text); background: rgba(255,255,255,0.1); }
    .log-pre { margin: 0; padding: 16px 20px; overflow: auto; font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.6; color: var(--c-accent); white-space: pre-wrap; word-break: break-word; }

    .footer-note { text-align: center; font-size: 11px; color: var(--c-muted); opacity: 0.6; margin-top: 6px; }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="brand">
        <div class="brand-icon">🛠️</div>
        <div class="brand-name">Tokusho <em>Control</em></div>
      </div>
      <div class="clock" id="clock">—</div>
    </div>
  </header>

  <main class="main">
    <div class="card">
      <div class="section-label">公開サイト</div>
      <div class="sites" id="sites"></div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="section-label">サーバー状況 <button class="reload" onclick="loadStatus()">更新</button></div>
        <div class="metrics" id="metrics"><p class="muted">読み込み中…</p></div>
      </div>

      <div class="card">
        <div class="section-label">サービス</div>
        <div id="svcWrap"><p class="muted">読み込み中…</p></div>
      </div>
    </div>

    <div class="footer-note">© Tokusho Control — 本人専用（Basic認証）</div>
  </main>

  <div class="modal-overlay" id="logModal" onclick="if(event.target===this)closeLogs()">
    <div class="modal-card">
      <div class="modal-head">
        <span class="modal-title">ログ: <em id="logSvc">—</em></span>
        <button class="modal-close" onclick="closeLogs()">閉じる</button>
      </div>
      <pre class="log-pre" id="logBody">…</pre>
    </div>
  </div>

  <script>
    var API = '/admin/api';

    // 公開サイト（リンク + 到達性ドット）
    var SITES = [
      { name: 'ポートフォリオ',   url: 'https://portfolio.tokusho.org' },
      { name: 'CEG 飲み部図鑑',   url: 'https://ceg.tokusho.org' },
      { name: 'SmartLock',        url: 'https://home.tokusho.org' },
      { name: 'SSH（URL経由）',   url: 'https://ssh.tokusho.org' }
    ];

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function fmtBytes(n) {
      if (n == null) return '-';
      var u = ['B','KB','MB','GB','TB']; var i = 0;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return n.toFixed(n < 10 && i > 0 ? 1 : 0) + u[i];
    }

    function renderSites() {
      var wrap = document.getElementById('sites');
      wrap.innerHTML = SITES.map(function (s, i) {
        return '<a class="site" href="' + esc(s.url) + '" target="_blank" rel="noopener">'
          + '<span class="dot" id="dot' + i + '"></span>'
          + '<span class="site-body"><span class="site-name">' + esc(s.name) + '</span>'
          + '<span class="site-url">' + esc(s.url.replace(/^https?:\/\//, '')) + '</span></span>'
          + '<span class="site-arrow">↗</span></a>';
      }).join('');
      // 到達性チェック（no-cors: 成功=到達、失敗=未到達のざっくり判定）
      SITES.forEach(function (s, i) {
        fetch(s.url, { mode: 'no-cors', cache: 'no-store' })
          .then(function () { document.getElementById('dot' + i).className = 'dot up'; })
          .catch(function () { document.getElementById('dot' + i).className = 'dot down'; });
      });
    }

    function renderMetrics(sys) {
      var el = document.getElementById('metrics');
      if (!sys) { el.innerHTML = '<p class="err">取得できませんでした</p>'; return; }
      var diskPct = sys.disk ? sys.disk.pct : 0;
      var memPct = sys.mem ? sys.mem.pct : 0;
      el.innerHTML =
        '<div class="metric"><div class="metric-label">稼働時間</div><div class="metric-value">' + esc(sys.uptime || '-') + '</div></div>'
        + '<div class="metric"><div class="metric-label">負荷 (1/5/15m)</div><div class="metric-value" style="font-size:14px">' + esc(sys.load || '-') + '</div></div>'
        + '<div class="metric"><div class="metric-label">ディスク /</div><div class="metric-value">' + diskPct + '%</div>'
        + (sys.disk ? '<div class="metric-sub">' + fmtBytes(sys.disk.used) + ' / ' + fmtBytes(sys.disk.total) + '</div>' : '')
        + '<div class="bar"><span class="' + (diskPct >= 85 ? 'hot' : '') + '" style="width:' + diskPct + '%"></span></div></div>'
        + '<div class="metric"><div class="metric-label">メモリ</div><div class="metric-value">' + memPct + '%</div>'
        + (sys.mem ? '<div class="metric-sub">' + fmtBytes(sys.mem.used) + ' / ' + fmtBytes(sys.mem.total) + '</div>' : '')
        + '<div class="bar"><span class="' + (memPct >= 85 ? 'hot' : '') + '" style="width:' + memPct + '%"></span></div></div>';
    }

    function renderServices(list) {
      var wrap = document.getElementById('svcWrap');
      if (!list || !list.length) { wrap.innerHTML = '<p class="muted">サービスなし</p>'; return; }
      var rows = list.map(function (s) {
        var active = s.active === 'active';
        var cls = active ? 'active' : (s.active || 'unknown');
        return '<tr>'
          + '<td><span style="font-weight:700">' + esc(s.label) + '</span><br><span class="muted" style="font-family:DM Mono,monospace;font-size:11px">' + esc(s.id) + '</span></td>'
          + '<td><span class="badge ' + cls + '">' + esc(s.active) + '</span></td>'
          + '<td><div class="svc-actions">'
          + '<button class="btn-sm" onclick="showLogs(\'' + esc(s.id) + '\')">ログ</button>'
          + '<button class="btn-sm warn" onclick="restartSvc(\'' + esc(s.id) + '\',this)">再起動</button>'
          + '</div></td></tr>';
      }).join('');
      wrap.innerHTML = '<table class="svc-table"><thead><tr><th>サービス</th><th>状態</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function loadStatus() {
      document.getElementById('metrics').innerHTML = '<p class="muted">読み込み中…</p>';
      fetch(API + '/status', { cache: 'no-store' })
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function (d) { renderMetrics(d.system); renderServices(d.services); })
        .catch(function () {
          document.getElementById('metrics').innerHTML = '<p class="err">管理APIに接続できません（tokusho-admin 起動 / nginx /admin/api/ を確認）</p>';
          document.getElementById('svcWrap').innerHTML = '<p class="err">—</p>';
        });
    }

    function restartSvc(id, btn) {
      if (!confirm(id + ' を再起動しますか？')) return;
      btn.disabled = true; btn.textContent = '…';
      fetch(API + '/restart', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ service: id })
      })
        .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
        .then(function (res) {
          if (!res.ok || !res.j.ok) alert('再起動失敗: ' + (res.j.detail || res.j.message || '不明'));
          loadStatus();
        })
        .catch(function (e) { alert('通信エラー: ' + e); })
        .finally(function () { btn.disabled = false; btn.textContent = '再起動'; });
    }

    function showLogs(id) {
      document.getElementById('logSvc').textContent = id;
      document.getElementById('logBody').textContent = '読み込み中…';
      document.getElementById('logModal').classList.add('open');
      fetch(API + '/logs?service=' + encodeURIComponent(id) + '&lines=120', { cache: 'no-store' })
        .then(function (r) { if (!r.ok) return r.json().then(function (j) { throw new Error(j.detail || r.status); }); return r.json(); })
        .then(function (d) { document.getElementById('logBody').textContent = (d.lines || []).join('\n') || '(ログなし)'; })
        .catch(function (e) { document.getElementById('logBody').textContent = 'ログ取得失敗: ' + e.message; });
    }
    function closeLogs() { document.getElementById('logModal').classList.remove('open'); }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeLogs(); });

    function tickClock() { document.getElementById('clock').textContent = new Date().toLocaleString('ja-JP'); }

    renderSites();
    loadStatus();
    tickClock();
    setInterval(tickClock, 1000);
    setInterval(loadStatus, 30000);
  </script>
</body>
</html>
