<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チーズエッグガーデン — 飲み部図鑑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=DM+Mono:wght@400;500&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #07080f;
      --surface: #0d0f1c;
      --border:  rgba(255,255,255,0.07);
      --text:    #e8eaf6;
      --muted:   #6b7299;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Zen Kaku Gothic New', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 50% 0%, rgba(120,80,255,0.06) 0%, transparent 60%); pointer-events: none; }

    /* ─── Header ─── */
    .header { position: relative; z-index: 10; padding: 0 32px; border-bottom: 1px solid var(--border); background: rgba(7,8,15,0.95); backdrop-filter: blur(16px); }
    .header-inner { max-width: 1000px; margin: 0 auto; height: 64px; display: flex; align-items: center; }
    .header-logo { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.02em; }
    .header-logo span { color: #a78bfa; }

    /* ─── Hero ─── */
    .hero { position: relative; z-index: 1; text-align: center; padding: 72px 24px 56px; }
    .hero-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
    .hero-title { font-family: 'Outfit', sans-serif; font-size: clamp(36px, 8vw, 64px); font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; color: #fff; margin-bottom: 16px; }
    .hero-title span { color: #f472b6; }
    .hero-sub { font-size: 15px; color: var(--muted); max-width: 480px; margin: 0 auto; line-height: 1.7; }

    .beer-count { display: inline-flex; align-items: center; gap: 10px; margin-top: 32px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; padding: 10px 22px; font-size: 13px; color: var(--muted); }
    .beer-count strong { color: #fff; font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 900; }

    /* ─── Member Grid ─── */
    .main { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 24px 80px; }
    .grid-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .grid-label::before { content: ''; width: 3px; height: 12px; background: #a78bfa; border-radius: 2px; }

    .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .member-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      overflow: hidden; text-decoration: none; color: inherit;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      animation: fadeUp 0.5s ease both;
      display: block;
    }
    .member-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); border-color: var(--accent-color, rgba(255,255,255,0.15)); }
    @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform:none; } }
    .member-card:nth-child(2) { animation-delay: 0.1s; }

    .card-photo-area { height: 200px; position: relative; overflow: hidden; }
    .card-photo-area img { width: 100%; height: 100%; object-fit: cover; object-position: top; filter: saturate(0.85); transition: filter 0.3s, transform 0.3s; }
    .member-card:hover .card-photo-area img { filter: saturate(1); transform: scale(1.03); }
    .card-photo-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(13,15,28,0.95) 100%); }
    .card-no { position: absolute; top: 12px; left: 12px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 3px 8px; color: rgba(255,255,255,0.6); }
    .card-color-bar { position: absolute; top: 0; right: 0; width: 4px; height: 100%; }

    .card-info { padding: 16px 20px 20px; }
    .card-name-ja { font-size: 22px; font-weight: 900; line-height: 1.2; margin-bottom: 2px; color: #fff; }
    .card-name-en { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 12px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
    .card-tag { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
    .card-drinks { display: flex; align-items: center; gap: 6px; color: var(--muted); }
    .card-drinks-val { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 900; }
    .card-arrow { color: var(--muted); font-size: 18px; transition: transform 0.2s, color 0.2s; }
    .member-card:hover .card-arrow { transform: translateX(4px); color: #fff; }

    .footer-note { text-align: center; margin-top: 48px; font-size: 11px; color: var(--muted); opacity: 0.4; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">🧀 Cheese Egg <span>Garden</span></div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-eyebrow">公式非公式 飲み部図鑑</div>
    <h1 class="hero-title">のみべ<span>図鑑</span></h1>
    <p class="hero-sub">チーズエッグガーデンが誇る、飲み部レベルの高いメンバーたちを紹介するネタサイトです。</p>
    <div class="beer-count">現在の登録数 <strong>2</strong> 名 🍺</div>
  </section>

  <main class="main">
    <div class="grid-label">メンバー一覧</div>
    <div class="member-grid">

      <!-- 和田寧々 -->
      <a href="/nene" class="member-card" style="--accent-color: rgba(59,130,246,0.4)">
        <div class="card-photo-area">
          <img src="/nene/nene.jpg" alt="和田寧々">
          <div class="card-photo-overlay"></div>
          <div class="card-no">No.001</div>
          <div class="card-color-bar" style="background: linear-gradient(180deg, #3b82f6, #1d4ed8)"></div>
        </div>
        <div class="card-info">
          <div class="card-name-ja">和田寧々</div>
          <div class="card-name-en">WADA NENE</div>
          <div class="card-tags">
            <span class="card-tag" style="background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.2)">4回生</span>
            <span class="card-tag" style="background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.25)">ISTJ</span>
            <span class="card-tag" style="background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.25)">辛辣担当</span>
          </div>
          <div class="card-footer">
            <div class="card-drinks">
              飲み度
              <span class="card-drinks-val" style="color:#3b82f6">98</span>
            </div>
            <span class="card-arrow">→</span>
          </div>
        </div>
      </a>

      <!-- ナラン・ジヤ -->
      <a href="/naran" class="member-card" style="--accent-color: rgba(236,72,153,0.4)">
        <div class="card-photo-area">
          <img src="/naran/naran.jpg" alt="ナラン・ジヤ">
          <div class="card-photo-overlay"></div>
          <div class="card-no">No.002</div>
          <div class="card-color-bar" style="background: linear-gradient(180deg, #ec4899, #9d174d)"></div>
        </div>
        <div class="card-info">
          <div class="card-name-ja">ナラン・ジヤ</div>
          <div class="card-name-en">NARAN JIYA</div>
          <div class="card-tags">
            <span class="card-tag" style="background:rgba(167,139,250,0.1);color:#c4b5fd;border:1px solid rgba(167,139,250,0.2)">早稲田大学</span>
            <span class="card-tag" style="background:rgba(236,72,153,0.12);color:#f9a8d4;border:1px solid rgba(236,72,153,0.25)">ISTJ</span>
            <span class="card-tag" style="background:rgba(236,72,153,0.12);color:#f9a8d4;border:1px solid rgba(236,72,153,0.25)">🎤 歌担当</span>
          </div>
          <div class="card-footer">
            <div class="card-drinks">
              飲み度
              <span class="card-drinks-val" style="color:#ec4899">88</span>
            </div>
            <span class="card-arrow">→</span>
          </div>
        </div>
      </a>

    </div>
    <div class="footer-note">© Cheese Egg Garden 飲み部図鑑 — 非公式・ネタサイトです</div>
  </main>
</body>
</html>
